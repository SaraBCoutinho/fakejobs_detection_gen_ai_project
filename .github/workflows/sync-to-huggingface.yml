name: Atualizar Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v6

      - name: Instalar cliente Hugging Face
        run: python -m pip install --upgrade huggingface_hub

      - name: Atualizar Space existente
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload SaraBCoutinho/fakejobs_detection_gen_ai_project . . \
            --repo-type space \
            --exclude=".git*" \
            --exclude=".github*" \
            --delete="*" \
            --commit-message="Atualização automática a partir do GitHub"
