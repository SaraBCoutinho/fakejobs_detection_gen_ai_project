name: Atualizar Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Enviar para o Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force \
            "https://SaraBCoutinho:${HF_TOKEN}@huggingface.co/spaces/SaraBCoutinho/fakejobs_detection_gen_ai_project" \
            HEAD:main
